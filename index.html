<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Recipe Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf9f6;
      --surface: #ffffff;
      --primary: #2d6a4f;
      --primary-light: #52b788;
      --accent: #e76f51;
      --text: #1b1b1b;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 2px 10px rgba(0,0,0,0.07);
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: linear-gradient(135deg, #1b4332 0%, #2d6a4f 45%, #40916c 100%);
      color: white;
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
    }
    header h1 { font-size: 2.1rem; font-weight: 800; letter-spacing: -0.5px; }
    header p { margin-top: 0.4rem; opacity: 0.82; font-size: 1rem; }

    .diet-toggle {
      display: flex; gap: 0.5rem; justify-content: center;
      margin-top: 1.25rem; flex-wrap: wrap;
    }
    .diet-btn {
      padding: 0.45rem 1.2rem;
      border: 2px solid rgba(255,255,255,0.45);
      border-radius: 100px;
      background: transparent; color: white;
      cursor: pointer; font-size: 0.88rem; font-weight: 500;
      transition: all 0.15s;
    }
    .diet-btn.active { background: white; color: var(--primary); border-color: white; }
    .diet-btn:hover:not(.active) { border-color: rgba(255,255,255,0.8); }

    .veg-note {
      margin-top: 0.6rem; font-size: 0.78rem; opacity: 0.65;
    }

    /* ─── Sticky Filter Bar ─── */
    .filters-section {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

    .filter-row {
      display: flex; align-items: center; gap: 0.6rem;
      overflow-x: auto; scrollbar-width: none; padding: 0.2rem 0;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-row + .filter-row { margin-top: 0.55rem; }

    .filter-label {
      font-size: 0.75rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; white-space: nowrap; min-width: 72px;
    }

    .chip {
      padding: 0.3rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 100px; background: white;
      color: var(--text); cursor: pointer;
      font-size: 0.82rem; white-space: nowrap;
      transition: all 0.13s; user-select: none;
      display: inline-flex; align-items: center; gap: 0.3em;
    }
    .chip:hover { border-color: var(--primary); color: var(--primary); }
    .chip.selected { background: var(--primary); border-color: var(--primary); color: white; }
    .chip.veg-chip.selected { background: #166534; border-color: #166534; }
    .chip.meat-chip.selected { background: #9b2226; border-color: #9b2226; }

    /* ─── Results bar ─── */
    .results-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 0 0.75rem;
    }
    .results-count { font-size: 0.88rem; color: var(--text-muted); }
    .clear-btn {
      padding: 0.3rem 0.7rem; border: none;
      background: transparent; color: var(--text-muted);
      cursor: pointer; font-size: 0.83rem; text-decoration: underline;
    }

    /* ─── Recipe Grid ─── */
    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.1rem; padding-bottom: 3rem;
    }

    /* ─── Recipe Card ─── */
    .recipe-card {
      background: var(--surface); border-radius: var(--radius);
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform 0.14s, box-shadow 0.14s;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .recipe-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,0.13); }

    .card-body { padding: 1.15rem; flex: 1; }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.6rem; }
    .card-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }

    .time-badge {
      background: #f3f4f6; color: var(--text-muted);
      padding: 0.18rem 0.55rem; border-radius: 100px;
      font-size: 0.76rem; white-space: nowrap; font-weight: 500;
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.6rem; }

    .ptag {
      padding: 0.18rem 0.6rem; border-radius: 100px;
      font-size: 0.73rem; font-weight: 600;
    }
    .ptag.veg { background: #dcfce7; color: #166534; }
    .ptag.meat { background: #fee2e2; color: #991b1b; }

    .mtag {
      padding: 0.18rem 0.6rem; border-radius: 5px;
      font-size: 0.73rem; background: #eff6ff; color: #1d4ed8;
    }

    .card-preview {
      margin-top: 0.65rem; font-size: 0.85rem; color: var(--text-muted);
      line-height: 1.55; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-footer {
      display: flex; gap: 0.35rem; padding: 0.65rem 1.15rem;
      border-top: 1px solid #f3f4f6; flex-wrap: wrap;
    }
    .ftag {
      font-size: 0.72rem; color: var(--text-muted);
      background: var(--bg); padding: 0.13rem 0.5rem; border-radius: 4px;
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center; padding: 4rem 1rem;
      color: var(--text-muted); grid-column: 1/-1;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state h3 { font-size: 1.15rem; margin-bottom: 0.4rem; color: var(--text); }

    /* ─── Modal ─── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.52); z-index: 1000;
      padding: 1rem; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white; border-radius: var(--radius);
      max-width: 660px; width: 100%; max-height: 92vh; overflow-y: auto;
    }

    .modal-header {
      padding: 1.4rem 1.4rem 0;
      position: sticky; top: 0; background: white; z-index: 1;
      border-bottom: 1px solid var(--border); padding-bottom: 1rem;
    }
    .modal-close {
      float: right; background: none; border: none;
      font-size: 1.6rem; cursor: pointer; color: var(--text-muted);
      line-height: 1; margin-left: 0.75rem;
    }
    .modal-title { font-size: 1.35rem; font-weight: 800; padding-right: 2rem; }
    .modal-meta { display: flex; gap: 0.5rem; align-items: center; margin-top: 0.6rem; flex-wrap: wrap; }

    .modal-body { padding: 1.25rem 1.4rem 1.6rem; }

    .section-label {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-muted); margin-bottom: 0.45rem; margin-top: 1.2rem;
    }

    .instructions { font-size: 0.93rem; line-height: 1.75; }

    .variant-box {
      padding: 0.8rem 1rem; border-radius: 0 10px 10px 0;
      margin-top: 0.75rem; font-size: 0.88rem; line-height: 1.6;
    }
    .variant-box.veg { background: #f0fdf4; border-left: 3px solid #22c55e; }
    .variant-box.meat { background: #fff7ed; border-left: 3px solid var(--accent); }
    .variant-box strong { display: block; margin-bottom: 0.25rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }

    .baby-box {
      background: #fffbeb; border-left: 3px solid #f59e0b;
      padding: 0.75rem 1rem; border-radius: 0 10px 10px 0;
      margin-top: 0.75rem; font-size: 0.86rem; line-height: 1.6;
    }
    .baby-box strong { display: block; margin-bottom: 0.25rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.55rem; }
      .recipe-grid { grid-template-columns: 1fr; }
      .filter-label { min-width: 60px; font-size: 0.7rem; }
      .modal-title { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>Quick Recipe Finder</h1>
    <p>Pick your protein, cooking method, veg &amp; carb — get dinner sorted.</p>
    <div class="diet-toggle">
      <button class="diet-btn active" data-diet="all">All Recipes</button>
      <button class="diet-btn" data-diet="veg">🌿 Vegetarian</button>
      <button class="diet-btn" data-diet="meat">🥩 Meat &amp; Fish</button>
    </div>
    <p class="veg-note">Vegetarian filter includes scallops, mussels &amp; clams</p>
  </div>
</header>

<div class="filters-section">
  <div class="container">
    <div class="filter-row">
      <span class="filter-label">Protein</span>
      <div id="protein-chips" style="display:flex;gap:0.4rem;flex-wrap:nowrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Method</span>
      <div id="method-chips" style="display:flex;gap:0.4rem;flex-wrap:nowrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Veg</span>
      <div id="veg-chips" style="display:flex;gap:0.4rem;flex-wrap:nowrap;"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Carb</span>
      <div id="carb-chips" style="display:flex;gap:0.4rem;flex-wrap:nowrap;"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="results-bar">
    <span class="results-count" id="results-count"></span>
    <button class="clear-btn" onclick="clearFilters()">Clear all filters</button>
  </div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <button class="modal-close" id="modal-close-btn">&#x2715;</button>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-meta" id="modal-meta"></div>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────

const VEG_PROTEINS = new Set([
  'eggs','tofu','halloumi','feta','paneer',
  'scallops','mussels','clams',
  'chickpeas','lentils','white-beans','black-beans'
]);

const PROTEIN_META = {

  'bread':    { label: 'Bread' },
  'gnocchi':  { label: 'Gnocchi' },
  'noodles':  { label: 'Noodles' },
  'tortilla': { label: 'Tortilla' },
  'quinoa':   { label: 'Quinoa' },

const recipes = [
  {
    id: 1,
    name: "Miso Salmon & Greens Bowl",
    time: 18,
    proteins: ['salmon', 'scallops'],
    methods: ['air-fryer', 'pan'],
    vegetables: ['bok-choy'],
    carbs: ['rice'],
    instructions: `Mix 1 tbsp miso paste, 1 tbsp soy sauce, 1 tsp sesame oil, and 1 grated garlic clove into a glaze. Brush over salmon fillets and air fry at 200°C for 8–10 min. While that's going, heat sesame oil in a pan, add sliced bok choy with a splash of water, cover for 2 min until just wilted. Microwave the rice pouch. Assemble bowls: rice, greens, salmon on top, drizzle any remaining glaze.`,

  },
  {

    time: 12,
    proteins: ['eggs', 'feta', 'chorizo'],
    methods: ['pan'],
    vegetables: ['spinach', 'cherry-tomatoes'],
    carbs: ['bread'],
    instructions: `Heat olive oil in a pan, add a minced garlic clove and halved cherry tomatoes, cook 2–3 min until tomatoes soften. Add big handfuls of baby spinach, stir until wilted. Make 3–4 wells, crack an egg into each, crumble feta around. Cover and cook 3–4 min until whites are set but yolks still soft. Serve with crusty bread.`,
    meatVariant: `Brown sliced chorizo or diced ham in the pan before the garlic, then continue as normal.`,
    babyNote: `Fully cook the yolk for baby's portion, chop spinach small.`
  },
  {
    id: 3,
    name: "Lemon Garlic Scallops with Peas & Rice",
    time: 15,
    proteins: ['scallops', 'chicken'],
    methods: ['pan', 'pressure-cooker'],
    vegetables: ['peas'],
    carbs: ['rice'],
    instructions: `Start rice in the pressure cooker (1 cup basmati, 1.25 cups water, 4 min high pressure, quick release). While it cooks, pat scallops dry and season with salt. Melt butter with olive oil in a pan, sear scallops 90 sec each side, remove. Add minced garlic and frozen peas to the same pan, cook 2 min, squeeze in lemon juice, toss through parsley. Return scallops briefly to warm. Serve over rice.`,
    meatVariant: `Season a chicken thigh, pan-sear 5–6 min each side in a separate pan while scallops cook, then slice on top.`,
    babyNote: `Scallops can be tough — chop very finely or just give them peas and rice with a little butter.`
  },
  {
    id: 4,
    name: "Pressure Cooker Dal with Yoghurt & Rice",

// ─── State ───────────────────────────────────────────────────────────────────

const state = {
  diet: 'all',       // 'all' | 'veg' | 'meat'
  proteins: new Set(),
  methods: new Set(),
  vegetables: new Set(),
  carbs: new Set(),
};

// ─── Helpers ─────────────────────────────────────────────────────────────────

function isVegProtein(p) { return VEG_PROTEINS.has(p); }

function recipeHasVegProtein(r) {
  return r.proteins.some(p => isVegProtein(p));
}
function recipeHasMeatProtein(r) {
  return r.proteins.some(p => !isVegProtein(p));
}

function recipeMatches(r) {
  // Diet filter
  if (state.diet === 'veg' && !recipeHasVegProtein(r)) return false;
  if (state.diet === 'meat' && !recipeHasMeatProtein(r)) return false;

  // Protein filter
  if (state.proteins.size > 0) {
    const visibleProteins = getVisibleProteins(r.proteins);
    if (!visibleProteins.some(p => state.proteins.has(p))) return false;
  }

  // Method filter
  if (state.methods.size > 0 && !r.methods.some(m => state.methods.has(m))) return false;

  // Veg filter
  if (state.vegetables.size > 0 && !r.vegetables.some(v => state.vegetables.has(v))) return false;

  // Carb filter
  if (state.carbs.size > 0 && !r.carbs.some(c => state.carbs.has(c))) return false;

  return true;
}

// In veg mode, only show veg proteins; in meat mode, only meat proteins; else all
function getVisibleProteins(proteins) {
  if (state.diet === 'veg') return proteins.filter(p => isVegProtein(p));
  if (state.diet === 'meat') return proteins.filter(p => !isVegProtein(p));
  return proteins;
}

// ─── Render chips ────────────────────────────────────────────────────────────

function getAllValues(key) {
  const values = new Set();
  recipes.forEach(r => (r[key] || []).forEach(v => values.add(v)));
  return [...values].sort();
}

function getVisibleProteinSet() {
  const all = getAllValues('proteins');
  if (state.diet === 'veg') return all.filter(p => isVegProtein(p));
  if (state.diet === 'meat') return all.filter(p => !isVegProtein(p));
  return all;
}

function buildChips(containerId, items, selectedSet, toggleFn, renderItem) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (selectedSet.has(item) ? ' selected' : '');
    const isVeg = VEG_PROTEINS.has(item);
    if (containerId === 'protein-chips') {
      btn.classList.add(isVeg ? 'veg-chip' : 'meat-chip');
    }
    btn.textContent = renderItem(item);
    btn.onclick = () => { toggleFn(item); render(); };
    el.appendChild(btn);
  });
}

function renderChips() {
  buildChips(
    'protein-chips',
    getVisibleProteinSet(),
    state.proteins,
    p => { state.proteins.has(p) ? state.proteins.delete(p) : state.proteins.add(p); },
    p => {
      const m = PROTEIN_META[p];
      return m ? `${m.emoji} ${m.label}` : p;
    }
  );

  buildChips(
    'method-chips',
    Object.keys(METHOD_META),
    state.methods,
    m => { state.methods.has(m) ? state.methods.delete(m) : state.methods.add(m); },
    m => {
      const meta = METHOD_META[m];
      return meta ? `${meta.emoji} ${meta.label}` : m;
    }
  );

  buildChips(
    'veg-chips',
    getAllValues('vegetables'),
    state.vegetables,
    v => { state.vegetables.has(v) ? state.vegetables.delete(v) : state.vegetables.add(v); },
    v => VEG_META[v] ? VEG_META[v].label : v
  );

  buildChips(
    'carb-chips',
    getAllValues('carbs'),
    state.carbs,
    c => { state.carbs.has(c) ? state.carbs.delete(c) : state.carbs.add(c); },
    c => CARB_META[c] ? CARB_META[c].label : c
  );
}

// ─── Render cards ────────────────────────────────────────────────────────────

function proteinTagsHTML(proteins) {
  const visible = getVisibleProteins(proteins);
  return visible.map(p => {
    const m = PROTEIN_META[p];
    const label = m ? `${m.emoji} ${m.label}` : p;
    const cls = isVegProtein(p) ? 'veg' : 'meat';
    return `<span class="ptag ${cls}">${label}</span>`;
  }).join('');
}

function methodTagsHTML(methods) {
  return methods.map(m => {
    const meta = METHOD_META[m];
    return `<span class="mtag">${meta ? meta.emoji + ' ' + meta.label : m}</span>`;
  }).join('');
}

function renderCards() {
  const grid = document.getElementById('recipe-grid');
  const matched = recipes.filter(recipeMatches);

  document.getElementById('results-count').textContent =
    matched.length === 0 ? 'No recipes match — try fewer filters'
    : `${matched.length} recipe${matched.length === 1 ? '' : 's'} found`;

  if (matched.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="emoji">🍽</div>
      <h3>No recipes found</h3>
      <p>Try removing some filters to see more options.</p>
    </div>`;
    return;
  }

  grid.innerHTML = matched.map(r => {
    const vegList = r.vegetables.map(v => VEG_META[v] ? VEG_META[v].label : v);
    const carbList = r.carbs.map(c => CARB_META[c] ? CARB_META[c].label : c);
    const footerTags = [...vegList, ...carbList].map(t => `<span class="ftag">${t}</span>`).join('');

    return `<div class="recipe-card" onclick="openModal(${r.id})">
      <div class="card-body">
        <div class="card-top">
          <span class="card-title">${r.name}</span>
          <span class="time-badge">⏱ ${r.time} min</span>
        </div>
        <div class="tag-row">${proteinTagsHTML(r.proteins)}</div>
        <div class="tag-row">${methodTagsHTML(r.methods)}</div>
        <p class="card-preview">${r.instructions}</p>
      </div>
      ${footerTags ? `<div class="card-footer">${footerTags}</div>` : ''}
    </div>`;
  }).join('');
}

function render() {
  renderChips();
  renderCards();
}

// ─── Modal ───────────────────────────────────────────────────────────────────

function openModal(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('modal-title').textContent = r.name;

  const allProteins = r.proteins.map(p => {
    const m = PROTEIN_META[p];
    const label = m ? `${m.emoji} ${m.label}` : p;
    const cls = isVegProtein(p) ? 'veg' : 'meat';
    return `<span class="ptag ${cls}">${label}</span>`;
  }).join('');
  const methods = r.methods.map(m => {
    const meta = METHOD_META[m];
    return `<span class="mtag">${meta ? meta.emoji + ' ' + meta.label : m}</span>`;
  }).join('');

  document.getElementById('modal-meta').innerHTML =
    `<span class="time-badge">⏱ ${r.time} min</span>${allProteins}${methods}`;

  let body = `
    <div class="section-label">Instructions</div>
    <p class="instructions">${r.instructions}</p>
  `;

  if (r.vegVariant) {
    body += `<div class="variant-box veg">
      <strong>🌿 Vegetarian version</strong>${r.vegVariant}
    </div>`;
  }
  if (r.meatVariant) {
    body += `<div class="variant-box meat">
      <strong>🥩 Add meat</strong>${r.meatVariant}
    </div>`;
  }
  if (r.babyNote) {
    body += `<div class="baby-box">
      <strong>👶 Baby note</strong>${r.babyNote}
    </div>`;
  }

  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── Diet toggle ─────────────────────────────────────────────────────────────

document.querySelectorAll('.diet-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.diet = btn.dataset.diet;
    state.proteins.clear(); // reset protein filter on diet switch
    document.querySelectorAll('.diet-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ─── Clear filters ────────────────────────────────────────────────────────────

function clearFilters() {
  state.proteins.clear();
  state.methods.clear();
  state.vegetables.clear();
  state.carbs.clear();
  render();
}
